name: Sage follow-up

on:
  workflow_dispatch:
    inputs:
      timestamp:
        description: Run folder timestamp/name
        required: false
        default: sage_followup_ci
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sage-followup.yml"
      - "beal_rsg_lab/sage_*.py"
      - "beal_rsg_lab/sage_followup_cli.py"
      - "tests/test_sage*.py"

permissions:
  contents: write
  actions: read

jobs:
  sage-followup:
    runs-on: ubuntu-latest
    env:
      SAGE_DOCKER_IMAGE: ${{ vars.SAGE_DOCKER_IMAGE || 'sagemath/sagemath:latest' }}
      SAGE_JOB_TIMEOUT_SECONDS: ${{ vars.SAGE_JOB_TIMEOUT_SECONDS || '60' }}
      RUN_ID: ${{ github.event.inputs.timestamp || 'sage_followup_ci' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Generate Sage follow-up jobs
        run: |
          python -m beal_rsg_lab.sage_followup_cli generate \
            --prime-limit 31 \
            --control-samples 16 \
            --timestamp "$RUN_ID"

      - name: Detect execution environment
        run: python -m beal_rsg_lab.sage_followup_cli detect --run-dir "runs/$RUN_ID"

      - name: Show Docker version
        run: docker --version

      - name: Pull Sage Docker image
        run: docker pull "$SAGE_DOCKER_IMAGE"

      - name: Run Sage smoke and real jobs through Docker
        run: |
          python -m beal_rsg_lab.sage_followup_cli roundtrip \
            --run-dir "runs/$RUN_ID" \
            --skip-generate \
            --backend docker \
            --timeout-seconds "$SAGE_JOB_TIMEOUT_SECONDS" \
            --dossier-dir "runs/$RUN_ID/dossiers"

      - name: Upload Sage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sage-results-${{ env.RUN_ID }}
          path: |
            runs/${{ env.RUN_ID }}/sage_results/
            runs/${{ env.RUN_ID }}/sage_job_manifest.csv
            runs/${{ env.RUN_ID }}/sage_environment.json
            runs/${{ env.RUN_ID }}/sage_environment_report.md
            runs/${{ env.RUN_ID }}/sage_execution_manifest.csv
            runs/${{ env.RUN_ID }}/sage_execution_results.csv
            runs/${{ env.RUN_ID }}/sage_import_results.csv
            runs/${{ env.RUN_ID }}/sage_known_case_calibration.csv
            runs/${{ env.RUN_ID }}/modular_confidence_summary.csv
            runs/${{ env.RUN_ID }}/sage_roundtrip_summary.csv
            runs/${{ env.RUN_ID }}/README_SAGE_FOLLOWUP_REPORT.md
            runs/${{ env.RUN_ID }}/dossiers/

      - name: Publish Sage results branch
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          worktree="../sage-artifact-worktree"
          rm -rf "$worktree"
          if git ls-remote --exit-code --heads origin sage-artifacts >/dev/null 2>&1; then
            git fetch origin sage-artifacts:sage-artifacts
            git worktree add "$worktree" sage-artifacts
          else
            git worktree add --detach "$worktree"
            (
              cd "$worktree"
              git switch --orphan sage-artifacts
              git rm -rf . >/dev/null 2>&1 || true
              find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            )
          fi
          target="$worktree/$RUN_ID"
          rm -rf "$target"
          mkdir -p "$target"
          for path in \
            "runs/$RUN_ID/sage_results" \
            "runs/$RUN_ID/sage_job_manifest.csv" \
            "runs/$RUN_ID/sage_environment.json" \
            "runs/$RUN_ID/sage_environment_report.md" \
            "runs/$RUN_ID/sage_execution_manifest.csv" \
            "runs/$RUN_ID/sage_execution_results.csv" \
            "runs/$RUN_ID/sage_import_results.csv" \
            "runs/$RUN_ID/sage_known_case_calibration.csv" \
            "runs/$RUN_ID/modular_confidence_summary.csv" \
            "runs/$RUN_ID/sage_roundtrip_summary.csv" \
            "runs/$RUN_ID/README_SAGE_FOLLOWUP_REPORT.md" \
            "runs/$RUN_ID/dossiers"; do
            if [ -e "$path" ]; then
              cp -R "$path" "$target/"
            fi
          done
          (
            cd "$worktree"
            git add "$RUN_ID"
            git commit -m "Publish Sage artifacts $RUN_ID" || echo "No Sage artifact changes to publish"
            git push origin HEAD:sage-artifacts
          )

      - name: Confirm Sage JSON and conservative labels
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path
          root = Path("runs") / "${{ env.RUN_ID }}"
          smoke_path = root / "sage_results" / "sage_smoke.json"
          assert smoke_path.exists(), "missing Sage smoke JSON"
          smoke = json.loads(smoke_path.read_text())
          assert smoke["sage_status"] == "completed", smoke
          assert smoke["contradiction_claim_allowed"] is False, smoke
          imports = list(csv.DictReader((root / "sage_import_results.csv").open()))
          confidence = list(csv.DictReader((root / "modular_confidence_summary.csv").open()))
          known = list(csv.DictReader((root / "sage_known_case_calibration.csv").open()))
          forbidden = {"proof", "proven", "disproven"}
          bad_statuses = {"failed", "timeout", "unavailable"}
          for row in imports:
              assert row["contradiction_claim_allowed"] == "False", row
              assert row["schema_valid"] == "True", row
              assert row["sage_status"] not in bad_statuses, row
          for row in confidence:
              label = row["updated_followup_label"]
              assert label not in forbidden, row
              assert label in {
                  "needs_external_sage_check",
                  "sage_checked_inconclusive",
                  "modular_followup_candidate",
                  "artifact_like",
                  "not_promising_yet",
              }, row
          for row in known:
              assert row["overpromoted"] == "False", row
          PY
